<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <link rel="stylesheet" href="./styles.css">
    <title>Frontend Mentor | Order summary card</title>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <img src="./assets/images/illustration-hero.svg" alt="illustration hero" class="illustration-hero">
        <div class="content">
          <h1>Order Summary</h1>
          <p class="description">
            You can now listen to millions of songs, audiobooks, and podcasts on any
            device anywhere you like!
          </p>
          <div class="price">
            <img src="./assets/images/icon-music.svg" alt="icon music">
            <div class="annual-plan">
              <h2>Annual Plan</h2>
              <p class="plan-price">$59.99/year</p>
            </div>
            <a href="#" class="change-plan" id="changePlanBtn">Change</a>
          </div>
          <button class="proceed-btn">Proceed to Payment</button>
          <a href="#" class="cancel-btn">Cancel Order</a>
        </div>
      </div>
    </div>

  <!-- Modal Popup -->
  <div id="planModal" class="modal">
    <div class="modal-content">
      <h2>Select a Plan</h2>
      <ul class="plan-list">
        <li data-plan="Weekly Plan" data-price="$2.00/week">Weekly Plan - $2.00/week</li>
        <li data-plan="Monthly Plan" data-price="$6.00/month">Monthly Plan - $6.00/month</li>
        <li data-plan="Annual Plan" data-price="$59.99/year">Annual Plan - $59.99/year</li>
      </ul>
      <button id="closeModalBtn" class="close-btn">Close</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById('planModal');
    const changePlanBtn = document.getElementById('changePlanBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const planItems = document.querySelectorAll('.plan-list li');
    const annualPlanDiv = document.querySelector('.annual-plan');

    // Open modal
    changePlanBtn.addEventListener('click', (e) => {
      e.preventDefault();
      modal.style.display = 'block';
    });

    // Close modal
    closeModalBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    // Select plan
    planItems.forEach(item => {
      item.addEventListener('click', () => {
        const plan = item.getAttribute('data-plan');
        const price = item.getAttribute('data-price');

        // Update annual plan div
        annualPlanDiv.querySelector('h2').textContent = plan;
        annualPlanDiv.querySelector('.plan-price').textContent = price;

        // Close modal
        modal.style.display = 'none';
      });
    });

    // Close modal if clicked outside content
    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>
</body>

</html>
